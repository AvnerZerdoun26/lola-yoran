<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invitation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #faf8f5;
        }
 
        .full-screen-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
 
        .breathing-logo {
            width: 100%;
            height: 100%;
            /* 'cover' force l'image à remplir tout l'espace en coupant les bords si nécessaire */
            object-fit: cover;
        
        }
 
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
 
        .btn-container {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
 
        .btn-invite {
            padding: 15px 40px;
            background-color: white;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
 
        .btn-invite:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
 
    <div class="full-screen-container">
        <img src="logo.png" alt="Enveloppe" class="breathing-logo">
       
        <div class="btn-container">
            <a href="invitation.html" class="btn-invite">Ouvrir</a>
        </div>
    </div>
 
</body>
</html>
